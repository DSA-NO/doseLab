name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (Geant4)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ci
          init-shell: bash
          cache-environment: true
          cache-downloads: true
          create-args: >-
            -c conda-forge
            geant4
            cmake
            ninja
            cxx-compiler

      - name: Toolchain info
        run: |
          micromamba run -n ci cmake --version
          micromamba run -n ci ninja --version
          micromamba run -n ci geant4-config --version

      - name: Configure
        run: |
          micromamba run -n ci bash -lc '
            cmake -S . -B build-ci -G Ninja \
              -DDOSELAB_BUILD_ROOT_SUMMARY=OFF \
              -DEXPAT_INCLUDE_DIR="$CONDA_PREFIX/include" \
              -DEXPAT_LIBRARY="$CONDA_PREFIX/lib/libexpat.so"'

      - name: Build
        run: micromamba run -n ci cmake --build build-ci --parallel

      - name: Smoke test (batch macro)
        working-directory: build-ci
        run: micromamba run -n ci ./doseLab -b run-simple.mac

  root-summary:
    name: Build (optional ROOT summary)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ci-root
          init-shell: bash
          cache-environment: true
          cache-downloads: true
          create-args: >-
            -c conda-forge
            geant4
            root
            cmake
            ninja
            expat
            cxx-compiler

      - name: Toolchain info
        run: |
          micromamba run -n ci-root cmake --version
          micromamba run -n ci-root root-config --version
          micromamba run -n ci-root geant4-config --version

      - name: Configure (ROOT required)
        run: |
          ROOT_CONFIG_PATH=$(micromamba run -n ci-root bash -lc 'command -v root-config')
          micromamba run -n ci-root bash -lc '
            cmake -S . -B build-root -G Ninja \
              -DDOSELAB_BUILD_ROOT_SUMMARY=ON \
              -DDOSELAB_REQUIRE_ROOT_SUMMARY=ON \
              -DDOSELAB_ROOT_CONFIG='"$ROOT_CONFIG_PATH"' \
              -DEXPAT_INCLUDE_DIR="$CONDA_PREFIX/include" \
              -DEXPAT_LIBRARY="$CONDA_PREFIX/lib/libexpat.so"'

      - name: Build (ROOT required)
        run: micromamba run -n ci-root cmake --build build-root --parallel

      - name: Smoke test (ROOT helper)
        working-directory: build-root
        run: micromamba run -n ci-root test -x ./doseLabRootSummary

  production-validation:
    name: Production validation
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup production environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: doselab-production
          environment-file: envs/doselab-production.yml
          init-shell: bash
          cache-environment: true
          cache-downloads: true

      - name: Build production profile
        run: DOSELAB_ENV_CMD=micromamba ./scripts/build-production.sh

      - name: Run production reference scenarios
        run: DOSELAB_ENV_CMD=micromamba ./scripts/run-production-reference.sh

      - name: Check baseline
        run: micromamba run -n doselab-production ./scripts/check-baseline.py --build-dir build-production --baseline analysis/baseline/reference_metrics.json --report analysis/production/latest/metrics.json

      - name: Upload production metrics
        uses: actions/upload-artifact@v4
        with:
          name: production-metrics
          path: analysis/production/latest/metrics.json

  fano-validation:
    name: Fano validation (precision-aware)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup production environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: doselab-production
          environment-file: envs/doselab-production.yml
          init-shell: bash
          cache-environment: true
          cache-downloads: true

      - name: Build production profile
        run: DOSELAB_ENV_CMD=micromamba ./scripts/build-production.sh

      - name: Run Fano matrix (fast mode)
        run: |
          DOSELAB_ENV_CMD=micromamba \
          DOSELAB_FANO_MODE=fast \
          DOSELAB_OUTPUT_DIR=analysis/fano/ci \
          ./scripts/run-fano-matrix.sh

      - name: Summarize and gate (physics only when precision passes)
        run: |
          micromamba run -n doselab-production ./scripts/summarize-fano-matrix.py \
            --input-dir analysis/fano/ci \
            --output-json analysis/fano/ci/summary.json \
            --output-text analysis/fano/ci/summary.txt \
            --strict \
            --ci-physics-gate

      - name: Upload Fano summary
        uses: actions/upload-artifact@v4
        with:
          name: fano-summary
          path: |
            analysis/fano/ci/summary.json
            analysis/fano/ci/summary.txt
