name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (Geant4)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ci
          init-shell: bash
          create-args: >-
            -c conda-forge
            geant4
            cmake
            ninja
            cxx-compiler

      - name: Toolchain info
        run: |
          micromamba run -n ci cmake --version
          micromamba run -n ci ninja --version
          micromamba run -n ci geant4-config --version

      - name: Configure
        run: >-
          micromamba run -n ci cmake -S . -B build-ci -G Ninja
          -DDOSELAB_BUILD_ROOT_SUMMARY=OFF

      - name: Build
        run: micromamba run -n ci cmake --build build-ci --parallel

      - name: Smoke test (batch macro)
        working-directory: build-ci
        run: micromamba run -n ci ./doseLab -b run-simple.mac

  root-summary:
    name: Build (optional ROOT summary)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ci-root
          init-shell: bash
          create-args: >-
            -c conda-forge
            geant4
            root
            cmake
            ninja
            cxx-compiler

      - name: Toolchain info
        run: |
          micromamba run -n ci-root cmake --version
          micromamba run -n ci-root root-config --version
          micromamba run -n ci-root geant4-config --version

      - name: Detect ROOT
        id: detect_root
        run: |
          if micromamba run -n ci-root command -v root-config >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$(micromamba run -n ci-root command -v root-config)" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure (ROOT required)
        if: steps.detect_root.outputs.found == 'true'
        run: >-
          micromamba run -n ci-root cmake -S . -B build-root -G Ninja
          -DDOSELAB_BUILD_ROOT_SUMMARY=ON
          -DDOSELAB_REQUIRE_ROOT_SUMMARY=ON
          -DDOSELAB_ROOT_CONFIG=${{ steps.detect_root.outputs.path }}

      - name: Build (ROOT required)
        if: steps.detect_root.outputs.found == 'true'
        run: micromamba run -n ci-root cmake --build build-root --parallel

      - name: Smoke test (ROOT helper)
        if: steps.detect_root.outputs.found == 'true'
        working-directory: build-root
        run: micromamba run -n ci-root test -x ./doseLabRootSummary

      - name: ROOT unavailable notice
        if: steps.detect_root.outputs.found != 'true'
        run: echo "root-config not available on this runner; skipped optional ROOT summary job."
